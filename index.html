<!-- Aplica el modo oscuro/claro guardado en este celular ANTES de que
     cargue cualquier otra cosa (incluida la propia pantalla de carga),
     para que no se vea un destello del tema equivocado mientras llegan
     los datos reales desde la nube. -->
<script>
  (function () {
    try {
      if (localStorage.getItem("vetapp:darkMode") === "1") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    } catch (e) {}
  })();
</script>

  /* ---------------------------------------------------------
     Modo oscuro: paleta propia (no es solo invertir colores),
     con superficies con relieve sutil por sombra, bordes casi

     sobre el fondo oscuro. Estilo similar a apps modernas

  [data-theme="dark"] { background: #121417; color-scheme: dark; }
  [data-theme="dark"] body { background: #121417; }
  [data-theme="dark"] { color: #ECEDEE; }

  /* Fondo de página */
  [data-theme="dark"] .bg-\[\#F7F4EC\] { background: #121417 !important; }

  /* Tarjetas y superficies: relieve por sombra, no por borde marcado */
  [data-theme="dark"] .bg-white {
    background: #1B1E22 !important;
    box-shadow: 0 1px 3px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.05);
  }
  [data-theme="dark"] .bg-\[\#EAF0EC\] { background: #23272C !important; }

  /* Bordes: casi invisibles, solo una línea muy sutil */
  [data-theme="dark"] .border-\[\#DDD5C4\] { border-color: rgba(255,255,255,.08) !important; }
  [data-theme="dark"] .border-dashed { border-color: rgba(255,255,255,.15) !important; }

  /* Jerarquía de texto */
  [data-theme="dark"] .text-\[\#23342F\] { color: #ECEDEE !important; }
  [data-theme="dark"] .text-\[\#6B7A72\] { color: #9BA1A6 !important; }
  [data-theme="dark"] .text-\[\#A6A08F\] { color: #72787D !important; }

  /* Campos de formulario: un tono "hundido", distinto al de las tarjetas */
  [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
    background: #16181B !important;
    color: #ECEDEE !important;
    border-color: rgba(255,255,255,.1) !important;
  }
  [data-theme="dark"] ::placeholder { color: #5B6166 !important; }

  /* Quita el resplandor de foco en color crema y usa uno acorde al tema oscuro */
  [data-theme="dark"] input:focus, [data-theme="dark"] textarea:focus, [data-theme="dark"] select:focus {
    box-shadow: 0 0 0 2px rgba(82,163,127,.5) !important;
  }

<body>
<div id="root">
  <div id="boot-msg">
    Cargando la app...
  </div>
</div>
<script>
  window.addEventListener("error", function (e) {
    var root = document.getElementById("root");
    if (root && root.querySelector("#boot-msg")) {
      root.innerHTML =
        '<div id="boot-msg"><strong>No se pudo cargar la app.</strong><br><br>Detalle: ' +
        (e.message || "error desconocido") +
        '</div>';
    }
  });
  // Registrar el service worker (habilita uso sin conexión una vez instalada).
  // Si no está soportado (p.ej. archivo local sin servidor), se ignora en silencio.
  // Además: cuando se detecta una versión nueva de la app (subida a GitHub),

<script>
const {
  useState,
  useEffect,
  useRef,
  useMemo
} = React;

/* ---------------------------------------------------------
   Firebase: configuración, autenticación (Google) y datos
   ---------------------------------------------------------
   IMPORTANTE: reemplaza estos valores con los de TU proyecto
   de Firebase (Configuración del proyecto → General → Tus apps).
   Estos datos son públicos (no son contraseñas), es normal que
   vayan escritos aquí, en el código del navegador.
----------------------------------------------------------*/
const firebaseConfig = {
  apiKey: "AIzaSyBvkkovcmGKGgm-X7inBcl54N9AnxoVU7w",
  authDomain: "vetdata-1557e.firebaseapp.com",
  projectId: "vetdata-1557e",
  storageBucket: "vetdata-1557e.firebasestorage.app",
  messagingSenderId: "420928741564",
  appId: "1:420928741564:web:f15d24133b8dbf3f1fb0b9"
};

// Clave pública (VAPID) para las notificaciones push. Se genera en:
// Firebase Console → Configuración del proyecto → Cloud Messaging →
// "Configuración web" → "Generar par de claves". Mientras diga
// "PENDIENTE_DE_CONFIGURAR", el botón de activar notificaciones explica que
// falta este paso en vez de fallar en silencio.
const VAPID_KEY = "BL5x--Ta7fwVMKdzwOZbeJ3WJZ8f0uZJN7u-q6oJO17gXbTwhP7FFqjVzP7udDuPEAQOoVUq12p9HlY6766ghtE";

// Recuerda, en este mismo celular/navegador (no en la nube), si esta
// persona ELIGIÓ tener las notificaciones activadas o desactivadas. Sirve
// para: al cerrar sesión se apagan solas (para no seguir avisando de una
// cuenta de la que ya se salió), pero al volver a iniciar sesión se
// reactivan solas — a menos que la última vez las hayas apagado tú mismo/a
// a propósito desde Configuración.
const CLAVE_PREFERENCIA_NOTIF = "vetapp:notifPreference";
const firebaseReady = firebaseConfig.apiKey && firebaseConfig.apiKey !== "TU_API_KEY";

/* ---------------------------------------------------------
   Cloudinary: almacenamiento de fotos y archivos (PDFs)
   ---------------------------------------------------------
   IMPORTANTE: reemplaza estos dos valores con los de TU cuenta
   de Cloudinary (cloudinary.com → Dashboard → "Cloud name", y un
   "Upload preset" que hayas creado en modo "Unsigned").
----------------------------------------------------------*/
const CLOUDINARY_CLOUD_NAME = "zcuh5bjn";
const CLOUDINARY_UPLOAD_PRESET = "vetdata_uploads";
const cloudinaryReady = CLOUDINARY_CLOUD_NAME !== "TU_CLOUD_NAME" && CLOUDINARY_UPLOAD_PRESET !== "TU_UPLOAD_PRESET";

// Carpeta de esta app + de este usuario/clínica dentro de Cloudinary — así, aunque la
// cuenta de Cloudinary se comparta con otras apps, nunca se mezclan los archivos, y
// dentro de VetData, cada doctor/a (o cada equipo de clínica) tiene los suyos aparte.
// Sigue la misma lógica que ya usa teamCollection() para los datos en Firestore:
// si hay un código de clínica configurado, se usa el espacio de equipo compartido;
// si no, el espacio personal del usuario.
// Nombre completo del doctor/a: usa los campos separados de nombres/apellidos
// si ya se llenaron; si no, usa el campo antiguo de una sola casilla (para
// cuentas que configuraron sus datos antes de este cambio).
function nombreCompletoDoctor(config) {
  if (config?.doctorNombres || config?.doctorApellidos) {
    return `${config.doctorNombres || ""} ${config.doctorApellidos || ""}`.trim();
  }
  return config?.doctorNombre || "";
}

// Roles disponibles al crear la cuenta. No todo el que usa la app es una
// clínica veterinaria (puede ser un peluquero, un vendedor de insumos,
// etc.), así que el rol elegido cambia cómo se llaman algunos campos del
// formulario (nombre del "negocio", si se muestra "Dr./Dra.", etc.).

  }
}

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

async function resizeImage(file, maxSize = 500) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let {
          width,
          height
        } = img;
        if (width > height && width > maxSize) {
          height = height * maxSize / width;
          width = maxSize;
        } else if (height > maxSize) {
          width = width * maxSize / height;
          height = maxSize;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", 0.8));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  switch (dateFormat) {
    case "DD/MM/YYYY":

    case "MM/DD/YYYY":
      return `${m}/${d}/${y}`;

  if (!ms) return "";

  if (segundos < 60) return "ahora";
  const minutos = Math.floor(segundos / 60);
  if (minutos < 60) return `hace ${minutos} min`;

  if (horas < 24) return `hace ${horas} h`;
  const dias = Math.floor(horas / 24);
  return `hace ${dias} d`;
}

function printCarnetVacunas(patient, entries, config) {
  const win = window.open("", "_blank");
  if (!win) {
    alert("Tu navegador bloqueó la ventana emergente. Permite ventanas emergentes para poder exportar el carnet.");
    return;
  }
  const esc = s => (s || "").toString().replace(/</g, "&lt;");
  const df = config?.dateFormat;
  const hoy = new Date().toISOString().slice(0, 10);
  const hoySort = hoy;
  const rows = entries.map(v => `
    <tr>
      <td>${esc(v.nombre)}</td>
      <td>${esc(formatDate(v.fechaAplicada, df))}</td>
      <td>${v.proximaDosis ? esc(formatDate(v.proximaDosis, df)) + (v.proximaDosis < hoySort ? " ⚠️" : "") : "-"}</td>
      <td>${esc(v.notas || "-")}</td>
    </tr>`).join("");
  const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8" />
    <title>Carnet de vacunación - ${esc(patient.nombre)}</title>
    <style>
      body{font-family: Arial, Helvetica, sans-serif; padding: 36px; color:#111; max-width:760px; margin:0 auto; font-size:13px;}
      .header{display:flex; align-items:center; gap:14px; border-bottom:2px solid #3D6B5C; padding-bottom:14px; margin-bottom:16px;}
      .header img{width:48px; height:48px; border-radius:8px; object-fit:cover;}
      h1{font-size:20px; margin:0;}
      table{width:100%; border-collapse:collapse; margin-top:10px;}
      th{text-align:left; font-size:11px; text-transform:uppercase; color:#6B7A72; border-bottom:1px solid #DDD; padding:6px 8px;}
      td{padding:8px; border-bottom:1px solid #EEE; font-size:13px;}
      @media print { body{padding:16px;} }
    </style>
    </head><body>
      <div class="header">
        ${config?.logo ? `<img src="${config.logo}" alt="" />` : ""}
        <div>
          <h1>Carnet de vacunación</h1>
          <div style="font-size:12px;color:#6B7A72;">${esc(config?.clinica || "")}</div>
        </div>
      </div>
      <p><b>Paciente:</b> ${esc(patient.nombre)} ${patient.propietario ? " · <b>Propietario:</b> " + esc(patient.propietario) : ""}</p>
      <table>
        <thead><tr><th>Vacuna</th><th>Aplicada</th><th>Próxima dosis</th><th>Notas</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${pieDePaginaHTML(config)}
    </body></html>`;
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 350);
}

// Arma un enlace de WhatsApp hacia el propietario. Limpia el número (quita
// espacios/guiones) y, si empieza en 0 (formato local ecuatoriano), le pone
// el código de país +593 delante para que WhatsApp lo reconozca bien.
function whatsappLink(telefono, mensaje) {
  let limpio = (telefono || "").replace(/[^\d+]/g, "");
  if (limpio.startsWith("0")) limpio = "593" + limpio.slice(1);
  if (limpio.startsWith("+")) limpio = limpio.slice(1);
  return `https://wa.me/${limpio}?text=${encodeURIComponent(mensaje)}`;
}
function shareCarnetVacunas(patient, entries, config) {
  const df = config?.dateFormat;
  const lines = [`CARNET DE VACUNACIÓN`, config?.clinica || "", `Paciente: ${patient.nombre}`, patient.propietario ? `Propietario: ${patient.propietario}` : null, "", ...entries.map(v => `• ${v.nombre} — Aplicada: ${formatDate(v.fechaAplicada, df)}${v.proximaDosis ? " — Próxima: " + formatDate(v.proximaDosis, df) : ""}`)].filter(Boolean);
  const text = lines.join("\n");
  if (navigator.share) {
    navigator.share({
      title: `Carnet de vacunación — ${patient.nombre}`,
      text
    }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert("Carnet copiado. Puedes pegarlo en WhatsApp o donde prefieras enviarlo."));
  } else {
    window.prompt("Copia el carnet:", text);
  }
}

function buildHash(active, selected, editing) {
  if (editing && editing.id) return `#pacientes/${editing.id}/editar`;
  if (selected && selected.id) return `#pacientes/${selected.id}`;

      active: "pacientes",
      selectedId: parts[1],
      editingId: null
    };
  }

    active: parts[0] || "inicio",

    editingId: null
