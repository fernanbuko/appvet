name: Revisar citas próximas y enviar notificaciones

on:
  schedule:
    # Cada 5 minutos (el intervalo más corto que permite GitHub para
    # tareas programadas). GitHub Actions usa hora UTC, pero esto no afecta
    # el resultado: el script calcula "cuánto falta para la cita"
    # comparando fechas completas, no solo la hora del reloj del robot.
    #
    # Aviso honesto: GitHub NO garantiza que se ejecute exactamente cada 5
    # minutos al segundo — en momentos de mucha carga en sus servidores
    # (poco común, pero puede pasar) a veces se retrasa unos minutos más.
    # Para el uso normal de una clínica esto no debería notarse.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # permite ejecutarlo a mano desde la pestaña Actions, para probar

jobs:
  revisar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install firebase-admin
        working-directory: notificaciones-robot

      - name: Ejecutar la revisión de citas
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node revisar-citas.js
        working-directory: notificaciones-robot
